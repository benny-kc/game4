<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Licznik punktów</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">

  <!-- iOS PWA support -->
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app">
    <header>
      <div>
        <div class="title">Licznik punktów</div>
        <div class="subtitle">Tryb mobilny + głos</div>
      </div>
      <div class="top-actions">
        <button class="btn-ghost" id="fullscreenBtn">⛶</button>
        <button class="btn-accent" id="addPlayerBtn">+ Gracz</button>
      </div>
    </header>

    <main class="players" id="playersContainer"></main>

    <div class="footer">
      <div>Suma punktów: <span class="total" id="totalScore">0</span></div>
      <div class="danger" id="resetAllBtn">Wyzeruj wszystko</div>
    </div>
  </div>

  <script type="text/javascript" src="script.js"></script>
</body>

</html>
